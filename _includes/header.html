<link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/robot.webp' | relative_url }}">
<header class="site-header" role="banner">
    <div class="site-header-inner">
        <a class="site-logo" href="{{ '/' | relative_url }}" aria-label="Home">
            {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" alt="{{ site.title }} logo">
            {% endif %}
            <div class="site-title">{{ site.title }}</div>
        </a>
        <div class="site-sub">{{ site.tagline | default: site.description }}</div>
    </div>
    <div class="header-search-wrap">
        <form class="header-search-form" role="search" action="{{ '/search' | relative_url }}" method="get">
            <label for="header-search" class="sr-only">Search posts</label>
            <input id="header-search" class="header-search-input" type="search" name="q" placeholder="Search posts…" autocomplete="off">
            <button class="header-search-btn" type="submit" aria-label="Search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
        </form>
    </div>
</header>
