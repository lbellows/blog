---
layout: default
title: Search
---
<div class="search-page">
    <form class="search-form" role="search" id="search-form">
        <label for="search-input" class="sr-only">Search posts</label>
        <input
            id="search-input"
            class="search-input"
            type="search"
            placeholder="Search posts…"
            autocomplete="off"
            autofocus
        >
        <button class="search-btn" type="submit" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>
    </form>
    <p class="search-status" id="search-status" aria-live="polite"></p>
    <section class="posts-grid" id="search-results" aria-label="Search results"></section>
</div>

<script>
(function () {
    var INDEX_URL = '{{ "/search.json" | relative_url }}';
    var posts = null;
    var input = document.getElementById('search-input');
    var status = document.getElementById('search-status');
    var results = document.getElementById('search-results');

    function getQuery() {
        var params = new URLSearchParams(window.location.search);
        return (params.get('q') || '').trim();
    }

    function setQuery(q) {
        var url = new URL(window.location.href);
        if (q) { url.searchParams.set('q', q); } else { url.searchParams.delete('q'); }
        history.replaceState(null, '', url.toString());
    }

    function highlight(text, terms) {
        if (!terms.length) return escapeHtml(text);
        var pattern = new RegExp('(' + terms.map(escapeRegex).join('|') + ')', 'gi');
        return escapeHtml(text).replace(pattern, '<mark>$1</mark>');
    }

    function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escapeRegex(s) {
        return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function renderPost(post, terms) {
        var tagsHtml = '';
        if (post.tags && post.tags.length) {
            tagsHtml = '<div class="post-tags" aria-label="Tags">' +
                post.tags.map(function(t){ return '<span class="tag">#' + escapeHtml(t) + '</span>'; }).join('') +
                '</div>';
        }
        return '<article class="post-card">' +
            '<div class="post-body">' +
                '<div class="post-meta"><time>' + escapeHtml(post.date) + '</time></div>' +
                '<h2 class="post-title"><a href="' + escapeHtml(post.url) + '">' + highlight(post.title, terms) + '</a></h2>' +
                '<p class="post-excerpt">' + highlight(post.excerpt, terms) + '</p>' +
                tagsHtml +
                '<p><a class="read-more" href="' + escapeHtml(post.url) + '">Read More &rarr;</a></p>' +
            '</div>' +
        '</article>';
    }

    function search(q) {
        setQuery(q);
        if (!q) {
            status.textContent = '';
            results.innerHTML = '';
            return;
        }
        var terms = q.toLowerCase().split(/\s+/).filter(Boolean);
        var matched = posts.filter(function(post) {
            var haystack = [post.title, post.excerpt, (post.tags || []).join(' ')].join(' ').toLowerCase();
            return terms.every(function(t) { return haystack.includes(t); });
        });
        status.textContent = matched.length
            ? matched.length + ' post' + (matched.length === 1 ? '' : 's') + ' found'
            : 'No posts found for \u201c' + q + '\u201d';
        results.innerHTML = matched.map(function(p) { return renderPost(p, terms); }).join('');
    }

    function init() {
        var q = getQuery();
        if (q) { input.value = q; }
        fetch(INDEX_URL)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                posts = data;
                if (q) { search(q); }
            })
            .catch(function() {
                status.textContent = 'Search index could not be loaded.';
            });

        var timer;
        input.addEventListener('input', function() {
            clearTimeout(timer);
            timer = setTimeout(function() { search(input.value.trim()); }, 200);
        });

        document.getElementById('search-form').addEventListener('submit', function(e) {
            e.preventDefault();
            search(input.value.trim());
        });
    }

    init();
})();
</script>
